services:
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: ashoo
      POSTGRES_USER: ashoo
      POSTGRES_PASSWORD: ashoo
    volumes:
      - timescale_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ashoo -d ashoo"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  timescale_data:

name: CI

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # Gradle caching: store the downloaded dependencies between runs.
      # Without this, every CI run re-downloads ~200MB of dependencies.
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Make gradlew executable
        run: chmod +x gradlew

      # Testcontainers pulls the timescale/timescaledb:latest-pg16 Docker image
      # automatically during the test run. Docker is available on ubuntu-latest runners.
      - name: Run tests
        run: ./gradlew test

      - name: Build production JAR
        run: ./gradlew bootJar

      # Upload the test report so failures are readable in the GitHub Actions UI
      # without having to clone and re-run locally.
      - name: Upload test report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: build/reports/tests/test/

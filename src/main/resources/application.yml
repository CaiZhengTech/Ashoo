spring:
  application:
    name: ashoo

  # Virtual threads: the single most important modern Java config in this app.
  # With this enabled, Spring runs scheduled tasks and HTTP request handling on
  # virtual threads instead of OS threads. For an I/O-bound polling app (waiting
  # on external API responses), this allows high concurrency with minimal memory.
  threads:
    virtual:
      enabled: true

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/${DB_NAME:ashoo}
    username: ${DB_USER:ashoo}
    password: ${DB_PASSWORD:ashoo}

  flyway:
    enabled: true
    locations: classpath:db/migration

ashoo:
  default-location:
    latitude: 42.1237
    longitude: -71.1847
    city: "Sharon, MA"
    country: "US"

  polling:
    interval-ms: 3600000  # 1 hour in ms

  openaq:
    api-key: ${OPENAQ_API_KEY:}
    base-url: https://api.openaq.org
    rate-limit-per-minute: 55  # Hard limit is 60 — leave 5 as buffer

  airnow:
    api-key: ${AIRNOW_API_KEY:}
    base-url: https://www.airnowapi.org

  anthropic:
    api-key: ${ANTHROPIC_API_KEY:}
    model: claude-sonnet-4-6
    max-tokens: 300

  correlation:
    min-symptom-days: 10
    lag-windows-hours: [0, 24, 48, 72]
    ewma-lambda: 0.3
    alert-on-threshold: 70.0
    alert-off-threshold: 55.0

  retention:
    raw-snapshots: "6 months"
    risk-scores: "6 months"

management:
  endpoints:
    web:
      exposure:
        include: health, metrics, info

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
